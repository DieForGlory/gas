// POST http://localhost:18083/api/v5/authentication
{
  "mechanism": "password_based",
  "backend": "http",
  "method": "post",
  "url": "http://api:8000/api/v1/mqtt/auth",
  "body": "username=${username}&password=${password}",
  "headers": {"content-type": "application/x-www-form-urlencoded"},
  "enable": true
}